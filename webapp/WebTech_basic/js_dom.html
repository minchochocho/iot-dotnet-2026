<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Js DOM</title>
    <style>
        .old{
            color:black;
            background-color: lightblue;
            padding: 10px;
            border-radius: 5px;
        }

        .new{
            color: white;
            background-color: darkolivegreen;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h2 id="title">Hello, JavaScript</h2>

    <script>
        let title = document.getElementById('title');

        console.log(title.innerText);

        title.innerText = "야 바꿔~~";
    </script>

    <button onclick="greeting()">클릭</button>
    <button ondblclick="changeText()">변경</button>

    <h2 id="msg">어서오세요~</h2>

    <script>
        function greeting(){
            alert('안녕하세요~!');
        }

        function changeText(){
            document.getElementById("msg").innerText = '또 오세요~';
        }
    </script>

    <hr>

    <h3 id="subtitle" class="old">기본 스타일</h3>

    <button onclick="changeClass()">스타일 변경</button>

    <script>
        function changeClass(){
            let subtitle = document.getElementById("title");

            subtitle.className = 'new';
        }
    </script>

    </body>
</html>
