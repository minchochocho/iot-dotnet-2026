<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입력태그 연습</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <h2>입력태그</h2>
    <hr>

    <!-- action submit이 일어나면 처리된 다음 URL -->
    <form action="/join" method="post">
        <!-- label for는 input의 특정 id와 매핑 -->
         <label for="userId" class="form-label">아이디</label>
        <!-- id와 name : id는 현재 HTML에서 한번만 정의되는 값
            name은 대부분 id를 대체해서 쓰는 값 -->
        <input type="text" name="userId" id="userId" class="form-control">
        <br>

        <!-- password -->
        <label for="password">비밀번호</label>
        <!-- type의 password는 컨트롤 종류, name/id의 password 지정된 명칭 -->
        <input type="password" name="password" id="password">
        <br>

        <!-- 이메일 -->
        <label for="email">이메일</label>
        <input type="email" name="email" id="email">
        <br>

        <!-- 나이 -->
        <label for="age">나이</label>
        <input type="number" name="age" id="age">
        <br>

        <!-- 생년월일 -->
        <label for="birth" class="form-label">생년월일</label>
        <input type="date" name="birth" id="birth">
        <br>
        
        <!-- 성별 -->
        <label>성별</label><br>
        <input type="radio" name="gender" id="male" value="M" class="form-check-input">
        <label for="male" class="form-check-label">남성</label>
        <input type="radio" name="gender" id="female" value="F" class="form-check-input">
        <label for="female" class="form-check-label">여성</label>
        <br>

        <!-- 관심분야 -->
        <label for="">관심분야</label><Br>
        <input type="checkbox" name="interest" id="java" value="java" class="form-check-input">
        <label for="java">Java</label>

        <input type="checkbox" name="interest" id="csharp" value="csharp" class="form-check-input">
        <label for="csharp">C#</label>

        <input type="checkbox" name="interest" id="python" value="python" class="form-check-input">
        <label for="python">Python</label>

        <input type="checkbox" name="interest" id="unity" value="unity" class="form-check-input">
        <label for="unity">Unity</label>

        <br>

        <!-- 지역 -->
        <label for="city">지역</label>
        <select id="city" name="city" class="form-select">
            <option value="seoul">서울</option>
            <option value="daejon">대전</option>
            <option value="daegu">대구</option>
            <option value="busan">부산</option>
        </select>
        <br>

        <!-- 프로필사진 -->
        <label for="photo">프로필 사진</label>
        <input type="file" name="photo" id="photo" class="form-control">
        <br>

        <!-- 자기소개 -->
        <label for="intro">자기소개</label><br>
        <textarea id="intro" name="intro" rows="5" cols="80" class="form-control"></textarea>
        <br>

        <!-- hidden -->
        <input type="hidden" name="role" value="USER">
        <br>

        <!-- button -->
        <input type="button" value="10" class="btn btn-info">
        <input type="submit" value="회원가입" class="btn btn-sm btn-primary">
        <input type="reset" value="초기화" class="btn btn-sm btn-warning">
        <br>
        <!-- 위의 3개와 완전 동일 -->
        <button type="button">20</button>
        <button type="submit">회원가입</button>
        <button type="reset">초기화</button>

    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
