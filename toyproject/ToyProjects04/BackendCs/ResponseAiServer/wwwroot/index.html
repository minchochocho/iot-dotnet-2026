<!DOCTYPE html>
<html lang="ko"><head>
    <meta charset="utf-8" />
    <title>물체인식</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
          crossorigin="anonymous">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card" style="width:700px">
        <div id="result">
            <img src="https://placehold.co/680x400" id="resultImg" class="card-img-top"/>
        </div>
        <div class="card-body">
            <h5 class="card-title">물체인식 요청</h5>
            <form method="post" enctype="multipart/form-data" id="fileUpload">

                <div class="mb-2">
                    <label for="message" id="returnMsg" class="form-label">메시지</label>
                    <input type="text" id="message" name="message" class="form-control" placeholder="메시지 입력"/>
                </div>    
            
                <div class="mb-2">
                    <label for="file" class="form-label">파일</label>
                    <input type="file" id="file" name="file" class="form-control" accept="image/*"/>
                </div> 
            
                <div class="mb-2 d-flex justify-content-end">
                    <input type="button" class="btn btn-success" value="인식 요청"/>
                </div>

             </form>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"> </script>

    <!-- ASP.NET Core API 호출 -->
    <script>
        // DOM
        var button = document.querySelector('input[type=button]');

        button.addEventListener('click', function () {
            var form = document.getElementById('fileUpload');
            var form_data = new FormData(form);

            // Validation Check
            var message = document.getElementById('message').value.trim();
            var file = document.getElementById('file').files[0];

            if (!file) {
                alert('파일을 선택해주세요.');
                return;
            }

            button.disabled = true;

            var xhr = new XMLHttpRequest();

            // 같은 서버에 있는 RestAPI 호출
            xhr.open('POST', '/net_service', true);

            xhr.onload = function () {
                button.disabled = false;

                if (xhr.status >= 200 && xhr.status < 300) {
                    var response = JSON.parse(xhr.responseText);
                    var returnMsg = document.getElementById('returnMsg');
                    returnMsg.innerHTML = '리턴메시지 > ' + response.message;

                    var resultImg = document.getElementById('resultImg');
                    resultImg.src = 'data:image/png;base64,' + response.image;
                } else {
                    console.error('error', xhr.status, xhr.responseText);
                    var errText = xhr.responseText;
                    try {
                        var errJson = JSON.parse(xhr.responseText);
                        if (errJson.message) errText = errJson.message;
                    } catch (e) { }
                    alert('인식 실패: ' + errText);
                }
            };

            xhr.onerror = function () {
                button.disabled = false;
                console.error('ERROR: network');
                alert('네트워크 오류가 발생했습니다.');
            };

            xhr.send(form_data);
        });
    </script>
</body>
</html>
